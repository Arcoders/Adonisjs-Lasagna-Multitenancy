user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Real client IP. Trust X-Forwarded-For only from the upstream LB/proxy
  # in front of nginx. Defaults below cover the docker compose private
  # networks; widen ONLY to the specific public CIDR(s) of your CDN/LB
  # (Cloudflare, Fastly, AWS ALB) — `0.0.0.0/0` lets any client forge
  # `X-Forwarded-For` and impersonate any IP in your logs/rate limiter.
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  upstream lasagna_app {
    # docker-compose service name + scaled replicas. Each replica gets a
    # round-robin slot. For sticky sessions (e.g. impersonation cookie or
    # subdomain affinity), switch to `ip_hash` or `hash $http_x_tenant_id`.
    server app:3333 max_fails=2 fail_timeout=10s;
    keepalive 32;
  }

  log_format jsonlog escape=json
    '{"time":"$time_iso8601","method":"$request_method","path":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,"rt":$request_time,'
    '"ua":"$http_user_agent","tenant":"$http_x_tenant_id","ip":"$remote_addr"}';
  access_log /var/log/nginx/access.log jsonlog;

  server {
    listen 80 default_server;

    # Pass everything to the app. TLS termination is expected to live one
    # layer above (cloud LB, Traefik, Cloudflare, etc.). Drop in a
    # `listen 443 ssl;` block here if nginx itself terminates TLS.
    location / {
      proxy_pass http://lasagna_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Bypass the proxy for healthchecks — they should be cheap and never
    # log against the access log.
    location = /healthz {
      access_log off;
      proxy_pass http://lasagna_app/healthz;
    }
  }
}
