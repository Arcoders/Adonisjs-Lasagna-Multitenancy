{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lasagna-app.fullname" . }}
  labels:
    {{- include "lasagna-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lasagna-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from the Ingress controller namespace and any
    # explicitly listed namespaces (e.g. monitoring/prometheus).
    - from:
        {{- range .Values.networkPolicy.ingressFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  egress:
    # DNS — required for hostname resolution of DB / Redis / external APIs.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Database (managed PG).
    - ports:
        - port: {{ .Values.networkPolicy.egressDatabasePort }}
          protocol: TCP
    # Redis.
    - ports:
        - port: {{ .Values.networkPolicy.egressRedisPort }}
          protocol: TCP
    # HTTPS — webhook delivery, OIDC discovery, S3 backups.
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
