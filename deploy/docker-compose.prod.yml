# Production-grade docker compose for an AdonisJS app using
# @adonisjs-lasagna/multitenancy. Three replicas of the app behind nginx,
# a Postgres primary + streaming replica, and a Redis instance.
#
# Required env (see docker-compose.prod.example.env):
#   APP_KEY, DB_USER, DB_PASSWORD, DB_NAME, REDIS_PASSWORD,
#   POSTGRES_REPLICATION_PASSWORD
#
# IMAGE PINNING: the tags below (`postgres:16-alpine`, `redis:7-alpine`,
# `nginx:1.27-alpine`) are mutable. For real production deploys, replace
# them with `image@sha256:<digest>` so a rebuild upstream cannot ship
# unexpected changes. You can find current digests via
# `docker buildx imagetools inspect <image>:<tag>`.
#
# Bring up:   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d
# Down:       docker compose -f deploy/docker-compose.prod.yml down -v
services:
  postgres-primary:
    image: postgres:16-alpine
    container_name: lasagna_pg_primary
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Replica login used in pg_basebackup + streaming.
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./postgres/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  postgres-replica:
    image: postgres:16-alpine
    container_name: lasagna_pg_replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGUSER: replicator
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    # On first boot, run pg_basebackup and start in standby mode.
    command:
      - "bash"
      - "-c"
      - |
        if [ ! -s "$$PGDATA/PG_VERSION" ]; then
          until pg_basebackup -h postgres-primary -D "$$PGDATA" -U replicator -Fp -Xs -P -R; do
            echo "Waiting for primary to accept replication"; sleep 2
          done
        fi
        chmod 0700 "$$PGDATA"
        exec docker-entrypoint.sh postgres
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lasagna_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: lasagna-app:latest
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_NAME}
      DB_REPLICA_HOST: postgres-replica
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: lasagna_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_data:
